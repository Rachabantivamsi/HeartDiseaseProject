<!DOCTYPE html>
<html>

<head>
    <title>Heart Disease Prediction</title>
    <link rel="stylesheet"
    href="{{ url_for('static',filename='style.css') }}">
</head>

<body>
    <div class="container">
    <h1>Heart Disease Prediction</h1>

    <form action="/predict" method="POST">

        <label>Age</label><br>
        <input type="number" name="age" required><br><br>

        <label>Sex</label><br>
        <select name="sex">
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select><br><br>

        <label>Chest Pain Type</label><br>
        <select name="cp">
            <option value="1">Type 1</option>
            <option value="2">Type 2</option>
            <option value="3">Type 3</option>
            <option value="4">Type 4</option>
        </select><br><br>

        <label>Resting Blood Pressure</label><br>
        <input type="number" name="bp" required><br><br>

        <label>Serum Cholesterol</label><br>
        <input type="number" name="chol" required><br><br>

        <label>Fasting Blood Sugar</label><br>
        <select name="fbs">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select><br><br>

        <label>Resting ECG</label><br>
        <select name="restecg">
            <option value="0">Normal</option>
            <option value="1">Abnormal</option>
            <option value="2">Hypertrophy</option>
        </select><br><br>

        <label>Maximum Heart Rate</label><br>
        <input type="number" name="thalach" required><br><br>

        <label>Exercise Induced Angina</label><br>
        <select name="exang">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select><br><br>

        <label>Oldpeak</label><br>
        <input type="number" step="0.1" name="oldpeak" required><br><br>

        <label>ST Segment</label><br>
        <select name="slope">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select><br><br>

        <label>Major Vessels</label><br>
        <select name="ca">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select><br><br>

        <label>Thal</label><br>
        <select name="thal">
            <option value="3">Normal</option>
            <option value="6">Fixed Defect</option>
            <option value="7">Reversible Defect</option>
        </select><br><br>

        <input type="submit" value="Predict">

    </form>
    {% if prediction %}

    <div class="result">
    
    {{prediction}}
    
    </div>
    
    {% endif %}


</body>
</html>
